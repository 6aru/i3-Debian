; Color palette is owned by the theme switcher ‚ÄĒ see colors.ini.
; Edit anything else in this file freely; theme switches will not
; touch it. Only colors.ini is rewritten when you switch themes.
include-file = colors.ini


[bar/example]
monitor = ${env:MONITOR:}
width = 100%
height = 24pt
radius = 6

; dpi = 96

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt

border-size = 4pt
border-color = #00000000

padding-left = 0
padding-right = 1

module-margin = 1

font-0 = JetBrainsMono Nerd Font:size=12.5:weight=medium;3
#font-1 = FontAwesome:size=12;4

modules-left = xworkspaces sep xwindow
modules-center = mpd sep date hour
modules-right = brightness filesystem sep pulseaudio sep memory sep cpu sep lock tray powermenu

fixed-center = true

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

wm-restack = i3

; override-redirect = true

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.background-alt}
label-active-underline= ${colors.primary}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/sep]
type = custom/text
content = |
content-foreground = ${colors.disabled}

[module/xwindow]
type = internal/xwindow
label = %title:0:100:...%
label-foreground = ${colors.foreground}

[module/filesystem]
type = internal/fs
interval = 25

mount-0 = /

label-mounted = %{F#d29922}%mountpoint%%{F-} %percentage_used%%

label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}

[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix = "VOL "
format-volume-prefix-foreground = ${colors.primary}
format-volume = <label-volume>

label-volume = %percentage%%

label-muted = muted
label-muted-foreground = ${colors.disabled}
click-left = ~/.config/i3/scripts/volumemenu

[module/lock]
type = internal/xkeyboard
;ignore :
format-margin = 0
blacklist-0 = num lock
blacklist-1 = scroll lock
format = <label-indicator>
label-indicator-padding = 0
indicator-icon-0 = caps lock;-CL;+CL
label-indicator-off =
label-indicator-on = "  Caps "
format-foreground = ${colors.background}
format-background = ${colors.alert}

[module/memory]
type = internal/memory
interval = 2
format-prefix = "RAM "
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "CPU "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = %{F#d29922}%ifname%%{F#4e5b55} disconnected

[module/wlan]
inherit = network-base
interface-type = wireless
label-connected = %{F#d29922}%ifname%%{F-} %essid% %local_ip%

[module/eth]
inherit = network-base
interface-type = wired
label-connected = %{F#d29922}%ifname%%{F-} %local_ip%

[module/battery]
type = internal/battery

battery = BAT0
adapter = AC

full-at = 99
low-at = 10

poll-interval = 5

format-charging = <animation-charging> <label-charging>
format-discharging = <ramp-capacity> <label-discharging>
format-full = <ramp-capacity> <label-full>

label-charging = %percentage%%
label-discharging = %percentage%%
label-full = %percentage%%

ramp-capacity-0 = ÔČĄ
ramp-capacity-1 = ÔČÉ
ramp-capacity-2 = ÔČā
ramp-capacity-3 = ÔČĀ
ramp-capacity-4 = ÔČÄ

animation-charging-0 = ÔČĄ
animation-charging-1 = ÔČÉ
animation-charging-2 = ÔČā
animation-charging-3 = ÔČĀ
animation-charging-4 = ÔČÄ
animation-charging-framerate = 750

click-left = ~/.config/i3/scripts/batterymenu

;;;;;;;;;;;;;;;; CENTER MODULES ;;;;;;;;;;;;;;;;

[module/hour]
type = internal/date
interval = 1
date = %l:%M %p
date-alt = %Y-%m-%d %l:%M:%S %p
label = %date%
label-foreground = ${colors.primary}

[module/date]
type = custom/script
interval = 60
format = <label>
exec = date +"%a %b %-d"
click-left = gsimplecal

[module/brightness]
type = internal/backlight

card = intel_backlight
use-actual-brightness = true

format = <ramp> <label>

label = %percentage%%

ramp-0 = ÓŹē
ramp-1 = ÓŹĒ
ramp-2 = ÓŹď
ramp-3 = ÓŹí
ramp-4 = ÓŹĎ

click-left = ~/.config/i3/scripts/brightnessmenu

enable-scroll = true
scroll-interval = 5

[module/screenshot]
type = custom/text
content = ůįĽõ
content-foreground = ${colors.secondary}
click-left = flameshot gui

[module/powermenu]
type = custom/text
content = ůįź•
content-foreground = ${colors.alert}
click-left = ~/.config/i3/scripts/power

[module/tray]
type = internal/tray
tray-spacing = 4px

[module/mpd]
type = internal/mpd

host = 127.0.0.1
port = 6600

format-online = <icon-prev> <toggle> <icon-next> <label-song>

icon-prev = ‚Źģ
icon-next = ‚Ź≠

icon-play = ‚Ė∂
icon-pause = ‚Źł

label-song = %title%

click-left = ~/.config/i3/scripts/music/musicmenu

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
