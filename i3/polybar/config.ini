[module/sep]
type = custom/text
content = " | "
content-foreground = ${colors.disabled}

[module/xwindow]
type = internal/xwindow
label = %title:0:100:...%
label-foreground = ${colors.foreground}

[module/memory]
type = internal/memory
interval = 2
format-prefix = "RAM "
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "CPU "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

[module/filesystem]
type = internal/fs
interval = 25

mount-0 = /

label-mounted = %{F#d29922}%mountpoint%%{F-} %percentage_used%%

label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}

[module/battery]
type = internal/battery

battery = BAT0
adapter = AC

full-at = 99
low-at = 10

poll-interval = 5

format-charging = <animation-charging> <label-charging>
format-discharging = <ramp-capacity> <label-discharging>
format-full = <ramp-capacity> <label-full>

label-charging = %percentage%%
label-discharging = %percentage%%
label-full = %percentage%%

ramp-capacity-0 = ÔČĄ
ramp-capacity-1 = ÔČÉ
ramp-capacity-2 = ÔČā
ramp-capacity-3 = ÔČĀ
ramp-capacity-4 = ÔČÄ

animation-charging-0 = ÔČĄ
animation-charging-1 = ÔČÉ
animation-charging-2 = ÔČā
animation-charging-3 = ÔČĀ
animation-charging-4 = ÔČÄ
animation-charging-framerate = 750

click-left = ~/.config/i3/scripts/battery


[module/xworkspaces]
type = internal/xworkspaces

enable-click = true
enable-scroll = true

icon-0 = 1;ůįÜć
icon-1 = 2;ůįĚį
icon-2 = 3;ůįáß
icon-3 = 4;ůįć©
icon-4 = 5;ůįŹĖ

icon-default = ÔÜí

label-active = %icon%
label-active-foreground = ${colors.foreground}

label-occupied = %icon%
label-occupied-foreground = ${colors.foreground}

label-empty = %icon%


label-empty-foreground = ${colors.disabled}

