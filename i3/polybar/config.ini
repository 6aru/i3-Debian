[bar/left]
monitor = ${env:MONITOR:}
override-redirect = false
bottom = false
fixed-center = true

width = 38%
height = 37

offset-x = 1%
offset-y = 5

background = ${colors.background}
foreground = ${colors.foreground}

radius = 12

border-size = 2
border-color = ${colors.border}

padding = 2

module-margin-left = 0
module-margin-right = 0

font-0 = JetBrainsMono Nerd Font:size=10;2

modules-left =
modules-center = xwindow sep memory sep cpu sep filesystem
modules-right =

wm-restack = i3
enable-ipc = true

cursor-click = pointer
cursor-scroll = ns-resize

[bar/center]
monitor = ${env:MONITOR:}
override-redirect = false
bottom = false
fixed-center = true

width = 20%
height = 37

offset-x = 40%
offset-y = 5

background = ${colors.background}
foreground = ${colors.foreground}

radius = 12

border-size = 2
border-color = ${colors.border}

padding = 1

module-margin-left = 0
module-margin-right = 0

font-0 = JetBrainsMono Nerd Font:size=10;2

modules-left =
modules-center = xworkspaces
modules-right =

wm-restack = i3
enable-ipc = true

cursor-click = pointer
cursor-scroll = ns-resize

[bar/right]
monitor = ${env:MONITOR:}
override-redirect = false
bottom = false
fixed-center = true

width = 38%
height = 37

offset-x = 61%
offset-y = 5

background = ${colors.background}
foreground = ${colors.foreground}

radius = 12

border-size = 2
border-color = ${colors.border}

padding = 2

module-margin-left = 0
module-margin-right = 0

font-0 = JetBrainsMono Nerd Font:size=10;2

modules-left = mpd

modules-center = wlan sep brightness sep pulseaudio

modules-right = date sep hour sep lock sep tray sep powermenu

wm-restack = i3
enable-ipc = true

cursor-click = pointer
cursor-scroll = ns-resize

