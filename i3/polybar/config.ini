[module/sep]
type = custom/text
content = " | "
content-foreground = ${colors.disabled}

[module/xwindow]
type = internal/xwindow
label = %title:0:100:...%
label-foreground = ${colors.foreground}

[module/memory]
type = internal/memory
interval = 2
format-prefix = "RAM "
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "CPU "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

[module/filesystem]
type = internal/fs
interval = 25

mount-0 = /

label-mounted = %{F#d29922}%mountpoint%%{F-} %percentage_used%%

label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}

[module/battery]
type = internal/battery

battery = BAT0
adapter = AC

full-at = 99
low-at = 10

poll-interval = 5

format-charging = <animation-charging> <label-charging>
format-discharging = <ramp-capacity> <label-discharging>
format-full = <ramp-capacity> <label-full>

label-charging = %percentage%%
label-discharging = %percentage%%
label-full = %percentage%%

ramp-capacity-0 = ÔČĄ
ramp-capacity-1 = ÔČÉ
ramp-capacity-2 = ÔČā
ramp-capacity-3 = ÔČĀ
ramp-capacity-4 = ÔČÄ

animation-charging-0 = ÔČĄ
animation-charging-1 = ÔČÉ
animation-charging-2 = ÔČā
animation-charging-3 = ÔČĀ
animation-charging-4 = ÔČÄ
animation-charging-framerate = 750

click-left = ~/.config/i3/scripts/battery


[module/xworkspaces]
type = internal/xworkspaces

enable-click = true
enable-scroll = true

icon-0 = 1;ůįÜć
icon-1 = 2;ůįĚį
icon-2 = 3;ůįáß
icon-3 = 4;ůįć©
icon-4 = 5;ůįŹĖ

icon-default = ÔÜí

label-active = %icon%
label-active-foreground = ${colors.foreground}

label-occupied = %icon%
label-occupied-foreground = ${colors.foreground}

label-empty = %icon%


label-empty-foreground = ${colors.disabled}

[module/mpd]
type = internal/mpd

host = 127.0.0.1
port = 6600

format-online = <icon-prev> <toggle> <icon-next> <label-song>

icon-prev = ‚Źģ
icon-next = ‚Ź≠

icon-play = ‚Ė∂
icon-pause = ‚Źł

label-song = %title%

click-left = ~/.config/i3/scripts/music/musicmenu

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = %{F#d29922}%ifname%%{F#4e5b55} disconnected

[module/wlan]
inherit = network-base
interface-type = wireless
label-connected = %{F#d29922}%ifname%%{F-} %essid% %local_ip%

[module/eth]
inherit = network-base
interface-type = wired
label-connected = %{F#d29922}%ifname%%{F-} %local_ip%


[module/brightness]
type = internal/backlight

card = intel_backlight
use-actual-brightness = true

format = <ramp> <label>

label = %percentage%%

ramp-0 = ÓŹē
ramp-1 = ÓŹĒ
ramp-2 = ÓŹď
ramp-3 = ÓŹí
ramp-4 = ÓŹĎ

click-left = ~/.config/i3/scripts/brightness

enable-scroll = true
scroll-interval = 5

[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix = "VOL "
format-volume-prefix-foreground = ${colors.primary}
format-volume = <label-volume>

label-volume = %percentage%%

label-muted = muted
label-muted-foreground = ${colors.disabled}
click-left = ~/.config/i3/scripts/volumemenu

[module/hour]
type = internal/date
interval = 1
date = %l:%M %p
date-alt = %Y-%m-%d %l:%M:%S %p
label = %date%
label-foreground = ${colors.primary}

[module/date]
type = custom/script
interval = 60
format = <label>
exec = date +"%a %b %-d"
click-left = gsimplecal

[module/powermenu]
type = custom/text
content = ůįź•
content-foreground = ${colors.alert}
click-left = ~/.config/i3/scripts/power

[module/tray]
type = internal/tray
tray-spacing = 4px

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
