[global/wm]
margin-bottom = 0
margin-top = 0

[bar/left]
monitor = ${env:MONITOR:}
override-redirect = false
bottom = false
fixed-center = true

width = 38%
height = 37

offset-x = 1%
offset-y = 5

background = ${colors.background}
foreground = ${colors.foreground}

radius = 12

border-size = 2
border-color = ${colors.border}

padding = 2

module-margin-left = 0
module-margin-right = 0

font-0 = JetBrainsMono Nerd Font:size=10;2
font-1 = JetBrainsMono Nerd Font:size=10;2

modules-left = i3 xwindow
modules-center = filesystem sep memory sep cpu sep temperature
modules-right = battery

wm-restack = i3
enable-ipc = true

cursor-click = pointer
cursor-scroll = ns-resize

[bar/center]
monitor = ${env:MONITOR:}
override-redirect = false
bottom = false
fixed-center = true

width = 20%
height = 37

offset-x = 40%
offset-y = 5

background = ${colors.background}
foreground = ${colors.foreground}

radius = 12

border-size = 2
border-color = ${colors.border}

padding = 1

module-margin-left = 0
module-margin-right = 0

font-0 = JetBrainsMono Nerd Font:size=10;2
font-1 = JetBrainsMono Nerd Font:size=10;2

modules-left =
modules-center = xworkspaces
modules-right =

wm-restack = i3
enable-ipc = true

cursor-click = pointer
cursor-scroll = ns-resize

[bar/right]
monitor = ${env:MONITOR:}
override-redirect = false
bottom = false
fixed-center = true

width = 38%
height = 37

offset-x = 61%
offset-y = 5

background = ${colors.background}
foreground = ${colors.foreground}

radius = 12

border-size = 2
border-color = ${colors.border}

padding = 2

module-margin-left = 0
module-margin-right = 0

font-0 = JetBrainsMono Nerd Font:size=10;2
font-1 = JetBrainsMono Nerd Font:size=10;2

modules-left = mpd

modules-center = wlan sep brightness sep pulseaudio

modules-right = date hour tray powermenu

wm-restack = i3
enable-ipc = true

cursor-click = pointer
cursor-scroll = ns-resize

;;;;;;;;;;;;;;;; MODULES ;;;;;;;;;;;;;;;;

[module/sep]
type = custom/text
content = " | "
content-foreground = ${colors.disabled}

[module/i3]
type = internal/i3
format = <label-mode>
; Custom prefix for a clean look (assuming ÔĆÉ is a logo symbol in your font)
format-prefix = "%{T2} ůį£ö %{T-}"
format-prefix-foreground = ${colors.primary}
label-mode = %mode%
label-mode-foreground = ${colors.foreground}
label-mode-padding = 2

[module/xwindow]
type = internal/xwindow
label = %title:0:40:...%
label-foreground = ${colors.foreground}
label-empty = I3-wm

[module/memory]
type = internal/memory
interval = 2
format-prefix = "ůįįě "
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "ůįĽ† "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

[module/filesystem]
type = internal/fs
interval = 25

mount-0 = /
format-mounted-prefix = "ůįčä "
format-mounted-prefix-foreground = ${colors.primary}

label-mounted = %{colors.foreground}%mountpoint%%{F-} %percentage_used%%

label-unmounted = %mountpoint% ůĪĀĆ
label-unmounted-foreground = ${colors.disabled}

[module/temperature]
type = internal/temperature

; Set the update interval in seconds (e.g., 2 seconds)
interval = 2

; The default thermal zone is usually 0, which often works for CPU temperature.
; If this doesn't work, try other numbers (1, 2, etc.) or use `hwmon-path` below.
hwmon-path = /sys/class/hwmon/hwmon4/temp1_input

; Set a warning temperature (optional)
warn-temperature = 75

; Normal format: displays a flame icon and the temperature
format = <ramp> <label>

; Warning format: uses the alert color defined in [colors]
format-warn = <ramp> <label-warn>
format-warn-foreground = ${colors.alert}

; Ramp/Icon: Uses the temperature level to select an icon
ramp-0 = Ôčč
ramp-1 = Ôčä
ramp-2 = ÔčČ
ramp-3 = Ôčą
ramp-4 = Ôčá
ramp-foreground = ${colors.primary}

; Label for the temperature output
label = %temperature-c%
label-warn = %temperature-c%

[module/battery]
type = internal/battery

battery = BAT0
adapter = AC

full-at = 99
low-at = 10

poll-interval = 5

format-charging = <animation-charging> <label-charging>
format-discharging = <ramp-capacity> <label-discharging>
format-full = <ramp-capacity> <label-full>

label-charging = %percentage%%
label-discharging = %percentage%%
label-full = %percentage%%

ramp-capacity-0 = ÔČĄ
ramp-capacity-1 = ÔČÉ
ramp-capacity-2 = ÔČā
ramp-capacity-3 = ÔČĀ
ramp-capacity-4 = ÔČÄ

animation-charging-0 = ÔČĄ
animation-charging-1 = ÔČÉ
animation-charging-2 = ÔČā
animation-charging-3 = ÔČĀ
animation-charging-4 = ÔČÄ
animation-charging-framerate = 750

click-left = ~/.config/i3/scripts/battery


[module/xworkspaces]
type = internal/xworkspaces

enable-click = true
enable-scroll = true

label-active = ůįģĮ
label-active-background = ${colors.background-alt}
label-active-foreground = ${colors.foreground}
label-active-padding = 1

label-occupied = ůįä†
label-occupied-background = ${colors.background}
label-occupied-foreground = ${colors.foreground}
label-occupied-padding = 1

label-empty = ůįĎä
label-empty-background = ${colors.background}
label-empty-foreground = ${colors.foreground}
label-empty-padding = 1

label-urgent = ůįä†
label-urgent-foreground = ${colors.alert}
label-urgent-padding = 1


[module/mpd]
type = internal/mpd

host = 127.0.0.1
port = 6600

format-online = <icon-prev> <toggle> <icon-next> |<label-song>

icon-prev = ‚Źģ
icon-next = ‚Ź≠

icon-play = ‚Ė∂
icon-pause = ‚Źł

label-song = %title%

click-left = ~/.config/i3/scripts/music/musicmenu

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = %{F#d29922}%ifname%%{F#4e5b55} disconnected

[module/wlan]
inherit = network-base
interface-type = wireless
label-connected = %{F#d29922}%ifname%%{F-} %essid% %local_ip%

[module/eth]
inherit = network-base
interface-type = wired
label-connected = %{F#d29922}%ifname%%{F-} %local_ip%


[module/brightness]
type = internal/backlight

card = intel_backlight
use-actual-brightness = true

format = <ramp> <label>

label = %percentage%%

ramp-0 = ÓŹē
ramp-1 = ÓŹĒ
ramp-2 = ÓŹď
ramp-3 = ÓŹí
ramp-4 = ÓŹĎ

click-left = ~/.config/i3/scripts/brightness

enable-scroll = true
scroll-interval = 5

[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix = "ůįĹü "
format-volume-prefix-foreground = ${colors.primary}
format-volume = <label-volume>

label-volume = %percentage%%

label-muted = ůįĹ†
label-muted-foreground = ${colors.disabled}
click-left = ~/.config/i3/scripts/volumemenu

[module/hour]
type = internal/date
interval = 1
date = %l:%M %p
date-alt = %Y-%m-%d %l:%M:%S %p
label = %date%
label-foreground = ${colors.primary}

[module/date]
type = custom/script
interval = 60
format = <label>
exec = date +"%b %-d"
click-left = gsimplecal

[module/powermenu]
type = custom/text
content = ůįź•
content-foreground = ${colors.alert}
click-left = ~/.config/i3/scripts/power

[module/tray]
type = internal/tray
tray-spacing = 4px

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
